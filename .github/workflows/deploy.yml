name: Deploy Cedibites API

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/production/laravel/cedibites_api
            git pull origin master
            composer install --no-dev --optimize-autoloader
            php artisan config:clear
            php artisan migrate --force
            php artisan cache:clear
            php artisan route:clear
            rm -f bootstrap/cache/routes-v7.php
            php artisan view:clear
            php artisan event:clear
            sudo systemctl reload php8.4-fpm
            echo "=== Diagnostics ==="
            echo "PWD: $(pwd)"
            echo "Git HEAD: $(git log --oneline -1)"
            echo "Route check:"
            php artisan route:list --path=pos/checkout-sessions --json 2>&1 | head -c 300
            echo ""
            echo "Nginx api.cedibites.com root:"
            grep -A2 'server_name.*api\.cedibites\.com' /etc/nginx/sites-enabled/* 2>/dev/null | head -10
