name: Deploy Cedibites Beta API

on:
  push:
    branches:
      - beta
  workflow_run:
    workflows: ["Deploy Cedibites API"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by production deploy, only run if it succeeded
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/beta/laravel/cedibites_api
            # If triggered by production deploy, pull master; otherwise pull beta branch
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              git pull origin master
            else
              git pull origin beta
            fi
            composer install --no-dev --optimize-autoloader
            php artisan config:clear
            php artisan migrate --force
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            sudo systemctl reload php8.4-fpm
